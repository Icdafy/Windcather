name: release

# 打 tag（如 v0.1.1）即自动在 Windows runner 上构建并发布到 GitHub Releases，
# 所有已安装用户的 app 下次启动会自动检测到新版本并提示更新。
on:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write          # 允许创建 Release 并上传产物
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (NSIS installer + latest.yml)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
